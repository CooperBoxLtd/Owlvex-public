# deploy-prod.yml - promote a dev-validated backend image to production
#
# Required GitHub secrets:
#   AZURE_CREDENTIALS              - output of: az ad sp create-for-rbac --sdk-auth
#   POSTGRES_ADMIN_PASSWORD_PROD   - production PostgreSQL admin password for schema verification
#
# Production deploys must promote the exact image tag validated in Azure dev.
# Do not rebuild a separate production image in this workflow.

name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Dev-validated owlvex-api image tag to promote"
        required: true
        type: string

jobs:
  promote:
    name: Promote dev image to prod
    runs-on: ubuntu-latest
    environment: production

    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      RESOURCE_GROUP: owlvex-prd
      LOCATION: uksouth
      PREFIX: owlvex
      APP_NAME: owlvex-api
      ACR_NAME: owlvexdevregistry
      ACR_RESOURCE_GROUP: owlvex-dev
      PG_SERVER_NAME: owlvex-dbserver
      ACR_USE_MANAGED_IDENTITY: "1"
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD_PROD }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify image exists in dev registry
        run: |
          az acr repository show-tags \
            --name "${ACR_NAME}" \
            --repository owlvex-api \
            --query "[?@=='${IMAGE_TAG}'] | [0]" \
            -o tsv | grep -Fx "${IMAGE_TAG}"

      - name: Promote image to production
        run: bash infra/promote-to-prod.sh

      - name: Production health check
        run: |
          API_URL=$(az webapp show \
            --name "${APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query defaultHostName -o tsv)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_URL}/health")
          echo "Health check: HTTP ${HTTP_STATUS} at https://${API_URL}/health"
          [[ "${HTTP_STATUS}" == "200" ]] || (echo "Health check failed" && exit 1)
