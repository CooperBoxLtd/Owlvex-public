# deploy-prod.yml — deploy to Azure App Service for Containers on push to main
#
# What it does:
#   1. Runs tests and benchmark gate
#   2. Builds and pushes Docker image to ACR
#   3. Updates the Azure Web App for Containers
#
# Required GitHub secrets:
#   AZURE_CREDENTIALS       — output of: az ad sp create-for-rbac --sdk-auth
#   RESOURCE_GROUP          — owlvex-prod
#   ACR_NAME                — owlvexregistry
#   ACR_LOGIN_SERVER        — owlvexregistry.azurecr.io
#   WEBAPP_NAME             — owlvex-api

name: Deploy to production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy-prod.yml'

jobs:
  test:
    name: Tests and benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Grounded data gate
        run: node tools/validate-grounded-data.mjs --strict

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Backend - install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: backend

      - name: Backend - tests
        run: pytest -q
        working-directory: backend

      - name: Extension - install and compile
        run: npm ci && npm run compile
        working-directory: extension

      - name: Extension — unit tests
        run: npm test
        working-directory: extension

      - name: Deterministic benchmark gate
        run: npm run benchmark:deterministic
        working-directory: extension

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -f backend/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:${IMAGE_TAG} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:${IMAGE_TAG}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:latest
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Update Web App container image
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ secrets.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ secrets.ACR_NAME }} --query passwords[0].value -o tsv)
          az webapp config container set \
            --name ${{ secrets.WEBAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:${{ env.IMAGE_TAG }} \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-registry-server-user "${ACR_USERNAME}" \
            --docker-registry-server-password "${ACR_PASSWORD}"

      - name: Health check
        run: |
          API_URL=$(az webapp show \
            --name ${{ secrets.WEBAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)
          sleep 20
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_URL}/health")
          echo "Health check: HTTP ${HTTP_STATUS} at https://${API_URL}/health"
          [[ "${HTTP_STATUS}" == "200" ]] || (echo "Health check failed" && exit 1)
