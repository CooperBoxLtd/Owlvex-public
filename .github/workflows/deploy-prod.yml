# deploy-prod.yml — deploy to Azure on push to main
#
# What it does:
#   1. Runs tests and benchmark gate
#   2. Builds and pushes Docker image to ACR
#   3. Updates the Container App
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS          — output of: az ad sp create-for-rbac --sdk-auth
#   RESOURCE_GROUP             — owlvex-prod
#   ACR_LOGIN_SERVER           — owlvexregistry.azurecr.io
#   CONTAINER_APP_NAME         — owlvex-api
#   POSTGRES_ADMIN_PASSWORD    — production DB password
#   SECRET_KEY                 — production secret key
#   ADMIN_KEY                  — production admin key
#   STRIPE_SECRET_KEY          — (optional)
#   STRIPE_WEBHOOK_SECRET      — (optional)
#   SENDGRID_API_KEY            — (optional)
#   STRIPE_PRICE_DEVELOPER_MONTHLY
#   STRIPE_PRICE_DEVELOPER_ANNUAL
#   STRIPE_PRICE_TEAM_MONTHLY
#   STRIPE_PRICE_TEAM_ANNUAL
#   FROM_EMAIL

name: Deploy to production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy-prod.yml'

jobs:
  test:
    name: Tests and benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Extension — install and compile
        run: npm ci && npm run compile
        working-directory: extension

      - name: Extension — unit tests
        run: npm test
        working-directory: extension

      - name: Deterministic benchmark gate
        run: npm run benchmark:deterministic
        working-directory: extension

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:${IMAGE_TAG} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:latest \
            ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:${IMAGE_TAG}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:latest
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/owlvex-api:${{ env.IMAGE_TAG }}

      - name: Health check
        run: |
          API_URL=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_URL}/health")
          echo "Health check: HTTP ${HTTP_STATUS} at https://${API_URL}/health"
          [[ "${HTTP_STATUS}" == "200" ]] || (echo "Health check failed" && exit 1)
