name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  grounded-data-gate:
    name: Grounded data gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate grounded data provenance and remediation packs
        run: node tools/validate-grounded-data.mjs --strict

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: grounded-data-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: backend

      - name: Run backend tests
        run: pytest -q
        working-directory: backend

  extension-test:
    name: Extension tests
    runs-on: ubuntu-latest
    needs: grounded-data-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extension

      - name: Run unit tests
        run: npm test
        working-directory: extension

  owlvex-scan:
    name: Owlvex security gate
    runs-on: ubuntu-latest
    needs: [grounded-data-gate, backend-test, extension-test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Build extension
        run: npm ci && npm run compile
        working-directory: extension

      - name: Build Owlvex CLI
        run: npm install && npm run build
        working-directory: cli

      - name: Scan — report deterministic findings
        # Scans extension/src as an integration smoke test.
        # Note: the scanner's own source contains pattern definitions that resemble
        # the patterns it detects (meta-findings). In a real application codebase,
        # add --fail-on deterministic to gate PRs on proven vulnerabilities.
        run: node cli/dist/owlvex.mjs scan extension/src

  deterministic-gate:
    name: Deterministic benchmark gate
    runs-on: ubuntu-latest
    needs: [grounded-data-gate, backend-test, extension-test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Run deterministic gate (execution-risk + sql-query axes)
        run: npm run benchmark:deterministic
        working-directory: extension

      - name: Print benchmark status
        run: npm run benchmark:status
        working-directory: extension
