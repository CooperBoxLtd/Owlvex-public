# deploy-dev.yml - manually deploy to the shared Azure development environment
#
# Required GitHub secrets:
#   AZURE_CREDENTIALS_DEV    - output of: az ad sp create-for-rbac --sdk-auth
#   RESOURCE_GROUP_DEV       - owlvex-dev
#   ACR_NAME_DEV             - owlvexdevregistry
#   ACR_LOGIN_SERVER_DEV     - owlvexdevregistry.azurecr.io
#   WEBAPP_NAME_DEV          - owlvexdev-api

name: Deploy to development

on:
  workflow_dispatch:

jobs:
  test:
    name: Tests and benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Grounded data gate
        run: node tools/validate-grounded-data.mjs --strict

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Backend - install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: backend

      - name: Backend - tests
        run: pytest -q
        working-directory: backend

      - name: Extension - install and compile
        run: npm ci && npm run compile
        working-directory: extension

      - name: Extension - unit tests
        run: npm test
        working-directory: extension

      - name: Deterministic benchmark gate
        run: npm run benchmark:deterministic
        working-directory: extension

  deploy:
    name: Build and deploy to dev
    runs-on: ubuntu-latest
    needs: test
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME_DEV }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -f backend/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER_DEV }}/owlvex-api:${IMAGE_TAG} \
            -t ${{ secrets.ACR_LOGIN_SERVER_DEV }}/owlvex-api:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER_DEV }}/owlvex-api:${IMAGE_TAG}
          docker push ${{ secrets.ACR_LOGIN_SERVER_DEV }}/owlvex-api:latest
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Update Web App container image
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ secrets.ACR_NAME_DEV }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ secrets.ACR_NAME_DEV }} --query passwords[0].value -o tsv)
          az webapp config container set \
            --name ${{ secrets.WEBAPP_NAME_DEV }} \
            --resource-group ${{ secrets.RESOURCE_GROUP_DEV }} \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER_DEV }}/owlvex-api:${{ env.IMAGE_TAG }} \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER_DEV }} \
            --docker-registry-server-user "${ACR_USERNAME}" \
            --docker-registry-server-password "${ACR_PASSWORD}"

      - name: Health check
        run: |
          API_URL=$(az webapp show \
            --name ${{ secrets.WEBAPP_NAME_DEV }} \
            --resource-group ${{ secrets.RESOURCE_GROUP_DEV }} \
            --query defaultHostName -o tsv)
          sleep 20
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_URL}/health")
          echo "Health check: HTTP ${HTTP_STATUS} at https://${API_URL}/health"
          [[ "${HTTP_STATUS}" == "200" ]] || (echo "Health check failed" && exit 1)
