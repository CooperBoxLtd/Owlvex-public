# ============================================================
# docker-compose.override.yml — development overrides only
# Hot-reload + exposes postgres for DBA tools (DBeaver etc.)
# Merged automatically by: docker compose up
# ============================================================

services:

  backend:
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    ports:
      - "5432:5432"
